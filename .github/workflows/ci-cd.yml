name: CI/CD Pipeline — LLM Inference Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}/llm-platform

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Lint + Test
  # ─────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install \
            fastapi==0.111.0 \
            uvicorn[standard]==0.29.0 \
            httpx==0.27.0 \
            pydantic==2.7.1 \
            pydantic-settings==2.2.1 \
            prometheus-client==0.20.0 \
            python-dotenv==1.0.1 \
            structlog==24.1.0 \
            redis==5.0.4 \
            pytest==8.2.0 \
            pytest-asyncio==0.23.6

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short

      - name: Check import health (gateway)
        run: |
          python -c "from api_gateway.main import app"
          echo "Gateway import OK"

      - name: Check import health (router)
        run: |
          python -c "from router.main import app"
          echo "Router import OK"

      - name: Validate Kubernetes manifests
        run: |
          for f in deployment/k8s/base/*.yaml; do
            python3 -c "import yaml; list(yaml.safe_load_all(open('$f')))" \
              && echo "OK: $f" || (echo "INVALID: $f" && exit 1)
          done

  # ─────────────────────────────────────────
  # JOB 2: Build & Push Docker Images
  # ─────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract git metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Build and Push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/Dockerfile.gateway
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-api-gateway:latest
            ${{ env.IMAGE_PREFIX }}-api-gateway:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Router
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/Dockerfile.router
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-router:latest
            ${{ env.IMAGE_PREFIX }}-router:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Inference Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/Dockerfile.worker
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-inference-worker:latest
            ${{ env.IMAGE_PREFIX }}-inference-worker:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Post build summary
        run: |
          echo "## Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| api-gateway | ${{ steps.meta.outputs.sha_short }} |" >> $GITHUB_STEP_SUMMARY
          echo "| router | ${{ steps.meta.outputs.sha_short }} |" >> $GITHUB_STEP_SUMMARY
          echo "| inference-worker | ${{ steps.meta.outputs.sha_short }} |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────
  # JOB 3: Deploy to Kubernetes
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Extract git SHA
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update image tags in manifests
        run: |
          sed -i "s|llm-inference-platform-inference-worker:latest|${{ env.IMAGE_PREFIX }}-inference-worker:${{ steps.meta.outputs.sha_short }}|g" deployment/k8s/base/worker.yaml
          sed -i "s|llm-inference-platform-router:latest|${{ env.IMAGE_PREFIX }}-router:${{ steps.meta.outputs.sha_short }}|g" deployment/k8s/base/router.yaml
          sed -i "s|llm-inference-platform-api-gateway:latest|${{ env.IMAGE_PREFIX }}-api-gateway:${{ steps.meta.outputs.sha_short }}|g" deployment/k8s/base/gateway.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -k deployment/k8s/base/
          kubectl rollout status deployment/api-gateway -n llm-platform --timeout=120s
          kubectl rollout status deployment/router -n llm-platform --timeout=120s
          kubectl rollout status deployment/inference-worker -n llm-platform --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n llm-platform
          kubectl get services -n llm-platform
