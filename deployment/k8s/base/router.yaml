apiVersion: apps/v1
kind: Deployment
metadata:
  name: router
  namespace: llm-platform
  labels:
    app: router
spec:
  replicas: 2
  selector:
    matchLabels:
      app: router
  template:
    metadata:
      labels:
        app: router
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: router
          image: llm-inference-platform-router:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: llm-platform-config
          env:
            - name: ROUTER_HOST
              value: "0.0.0.0"
            - name: ROUTER_PORT
              value: "8001"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: router-service
  namespace: llm-platform
spec:
  selector:
    app: router
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
